{% extends "base.html" %}
{% block title %}Đăng nhập — Hotel Reminder{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-1">
                    <i class="bi bi-bell-fill text-primary"></i>
                </h3>
                <h5 class="text-center text-muted mb-4">Hotel Reminder System</h5>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
                    </button>
                </form>

                <p class="text-center text-muted mt-3 small">
                    Tài khoản mặc định: <strong>admin</strong> / <strong>admin123</strong>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
